<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#8B4513">
  <title>Adopsi Kucing - Temukan Sahabat Berbulu Impianmu</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap');
    body { font-family: 'Poppins', sans-serif; }
    .wood-bg {
      background: linear-gradient(135deg, #8B4513 0%, #A0522D 50%, #8B4513 100%);
      background-attachment: fixed;
    }
    .card-hover:hover { transform: translateY(-8px); }
    .toast { animation: slideUp 0.3s ease-out; }
    @keyframes slideUp { from { opacity: 0; transform: translate(-50%, 20px); } to { opacity: 1; transform: translate(-50%, 0); } }
    .modal-content { animation: fadeIn 0.3s ease-out; }
    @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
  </style>
</head>
<body class="wood-bg min-h-screen">

  <!-- HEADER -->
  <header class="text-center pt-8 pb-6 px-4">
    <div class="inline-flex items-center justify-center w-20 h-20 rounded-full bg-amber-700 mb-4 shadow-lg">
      <i class="fas fa-paw text-4xl text-white"></i>
    </div>
    <h1 class="text-4xl md:text-5xl font-bold text-amber-50 mb-2 drop-shadow-lg">🐱 Adopsi Kucing</h1>
    <p class="text-amber-100 text-lg mb-6">Temukan sahabat berbulu impianmu</p>
    <div class="flex flex-wrap justify-center gap-3">
      <button onclick="toggleDarkMode()" id="darkModeBtn" class="flex items-center gap-2 px-4 py-2 bg-amber-700 hover:bg-amber-800 text-white rounded-full transition-all shadow-md">
        <i class="fas fa-moon"></i> Mode Gelap
      </button>
      <button onclick="toggleStats()" class="flex items-center gap-2 px-4 py-2 bg-amber-700 hover:bg-amber-800 text-white rounded-full transition-all shadow-md">
        <i class="fas fa-chart-bar"></i> Statistik
      </button>
    </div>
  </header>

  <!-- SEARCH BAR -->
  <div class="max-w-xl mx-auto px-4 mb-8">
    <div class="relative">
      <i class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-amber-800"></i>
      <input type="text" id="searchInput" placeholder="Cari nama, warna, sifat, lokasi..." 
             oninput="filterCats()"
             class="w-full pl-12 pr-4 py-3 rounded-full bg-amber-50 text-amber-900 placeholder-amber-600 border-2 border-amber-600 focus:outline-none focus:ring-2 focus:ring-amber-400 shadow-lg">
    </div>
  </div>

  <!-- MAIN CARD -->
  <main class="max-w-6xl mx-auto px-4 pb-8">
    <div class="rounded-3xl p-6 shadow-2xl bg-amber-200/90 backdrop-blur" id="mainCard">
      
      <!-- STATS ROW -->
      <div id="statsRow" class="hidden grid-cols-2 md:grid-cols-4 gap-4 mb-6">
        <div class="p-4 rounded-2xl text-center bg-amber-100">
          <i class="fas fa-cat text-2xl text-amber-700 mb-2"></i>
          <span class="block text-2xl font-bold text-amber-900" id="statTotal">8</span>
          <span class="text-sm text-amber-700">Tersedia</span>
        </div>
        <div class="p-4 rounded-2xl text-center bg-amber-100">
          <i class="fas fa-check-circle text-2xl text-green-600 mb-2"></i>
          <span class="block text-2xl font-bold text-amber-900">2</span>
          <span class="text-sm text-amber-700">Diadopsi</span>
        </div>
        <div class="p-4 rounded-2xl text-center bg-amber-100">
          <i class="fas fa-clock text-2xl text-orange-500 mb-2"></i>
          <span class="block text-2xl font-bold text-amber-900">1</span>
          <span class="text-sm text-amber-700">Diproses</span>
        </div>
        <div class="p-4 rounded-2xl text-center bg-amber-100">
          <i class="fas fa-heart text-2xl text-red-500 mb-2"></i>
          <span class="block text-2xl font-bold text-amber-900" id="statFav">0</span>
          <span class="text-sm text-amber-700">Favorit</span>
        </div>
      </div>

      <!-- FILTER BUTTONS -->
      <div class="flex flex-wrap gap-2 mb-6">
        <button onclick="setFilter('all')" data-filter="all" class="filter-btn active px-4 py-2 rounded-full font-medium bg-amber-700 text-white shadow-lg">🐱 Semua</button>
        <button onclick="setFilter('kitten')" data-filter="kitten" class="filter-btn px-4 py-2 rounded-full font-medium bg-amber-100 text-amber-900 hover:bg-amber-200">🐈 Anak Kucing</button>
        <button onclick="setFilter('adult')" data-filter="adult" class="filter-btn px-4 py-2 rounded-full font-medium bg-amber-100 text-amber-900 hover:bg-amber-200">😺 Dewasa</button>
        <button onclick="setFilter('senior')" data-filter="senior" class="filter-btn px-4 py-2 rounded-full font-medium bg-amber-100 text-amber-900 hover:bg-amber-200">😸 Senior</button>
        <button onclick="setFilter('favorit')" data-filter="favorit" class="filter-btn px-4 py-2 rounded-full font-medium bg-amber-100 text-amber-900 hover:bg-amber-200">❤️ Favorit (<span id="favCount">0</span>)</button>
      </div>

      <!-- CAT GRID -->
      <div id="catGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6"></div>

      <!-- EMPTY STATE -->
      <div id="emptyState" class="hidden text-center py-12">
        <i class="fas fa-cat text-6xl text-amber-700 opacity-50 mb-4"></i>
        <p class="text-lg text-amber-800" id="emptyText">Tidak ada kucing yang ditemukan.</p>
      </div>
    </div>
  </main>

  <!-- FOOTER -->
  <footer class="text-center py-6 text-amber-100/70">
    <p><i class="fas fa-sparkles"></i> Made with ❤️ for cats | UTS Project 2024 <i class="fas fa-sparkles"></i></p>
  </footer>

  <!-- MODAL -->
  <div id="modal" class="fixed inset-0 z-50 hidden items-center justify-center p-4 bg-black/60 backdrop-blur-sm" onclick="closeModal(event)">
    <div id="modalContent" class="modal-content relative max-w-lg w-full rounded-3xl overflow-hidden shadow-2xl bg-amber-50" onclick="event.stopPropagation()"></div>
  </div>

  <!-- TOAST -->
  <div id="toast" class="toast fixed bottom-6 left-1/2 -translate-x-1/2 z-50 px-6 py-3 rounded-full bg-amber-900 text-white shadow-lg hidden"></div>

<script>
// DATA KUCING
const catsData = [
  { id: 1, name: "Milo", age: "3 bulan", category: "kitten", color: "Orange Tabby", gender: "Jantan", traits: ["Playful", "Curious", "Energetic"], location: "Jakarta Selatan", seed: 101 },
  { id: 2, name: "Luna", age: "2 tahun", category: "adult", color: "Hitam Putih", gender: "Betina", traits: ["Calm", "Affectionate", "Independent"], location: "Bandung", seed: 202 },
  { id: 3, name: "Simba", age: "8 tahun", category: "senior", color: "Golden", gender: "Jantan", traits: ["Gentle", "Loyal", "Quiet"], location: "Surabaya", seed: 303 },
  { id: 4, name: "Bella", age: "5 bulan", category: "kitten", color: "Calico", gender: "Betina", traits: ["Sweet", "Shy", "Cuddly"], location: "Yogyakarta", seed: 404 },
  { id: 5, name: "Oscar", age: "4 tahun", category: "adult", color: "Grey Tabby", gender: "Jantan", traits: ["Friendly", "Active", "Smart"], location: "Medan", seed: 505 },
  { id: 6, name: "Cleo", age: "10 tahun", category: "senior", color: "Cream", gender: "Betina", traits: ["Wise", "Loving", "Peaceful"], location: "Semarang", seed: 606 },
  { id: 7, name: "Tiger", age: "1 tahun", category: "adult", color: "Orange Stripe", gender: "Jantan", traits: ["Bold", "Adventurous", "Playful"], location: "Bali", seed: 707 },
  { id: 8, name: "Nala", age: "4 bulan", category: "kitten", color: "White", gender: "Betina", traits: ["Innocent", "Fluffy", "Adorable"], location: "Malang", seed: 808 },
];

let favorites = JSON.parse(localStorage.getItem('catFavorites') || '[]');
let currentFilter = 'all';
let darkMode = false;

// INITIALIZE
document.addEventListener('DOMContentLoaded', () => {
  renderCats();
  updateFavCount();
});

// RENDER CATS
function renderCats() {
  const grid = document.getElementById('catGrid');
  const search = document.getElementById('searchInput').value.toLowerCase();
  
  let cats = catsData;
  
  // Filter by category
  if (currentFilter === 'favorit') {
    cats = cats.filter(cat => favorites.includes(cat.id));
  } else if (currentFilter !== 'all') {
    cats = cats.filter(cat => cat.category === currentFilter);
  }
  
  // Filter by search
  if (search) {
    cats = cats.filter(cat => 
      cat.name.toLowerCase().includes(search) ||
      cat.color.toLowerCase().includes(search) ||
      cat.traits.some(t => t.toLowerCase().includes(search)) ||
      cat.location.toLowerCase().includes(search)
    );
  }
  
  if (cats.length === 0) {
    grid.innerHTML = '';
    document.getElementById('emptyState').classList.remove('hidden');
    document.getElementById('emptyText').textContent = currentFilter === 'favorit' 
      ? 'Belum ada kucing favorit. Klik ❤️ untuk menambahkan!' 
      : 'Tidak ada kucing yang ditemukan.';
    return;
  }
  
  document.getElementById('emptyState').classList.add('hidden');
  
  grid.innerHTML = cats.map(cat => `
    <div class="group rounded-2xl overflow-hidden shadow-lg hover:shadow-2xl transition-all duration-300 card-hover cursor-pointer ${darkMode ? 'bg-amber-900' : 'bg-amber-50'}" onclick="openModal(${cat.id})">
      <div class="relative h-48 overflow-hidden">
        <img src="https://cataas.com/cat?width=400&height=300&${cat.seed}" 
             alt="${cat.name}" 
             class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-500"
             onerror="this.src='https://placekitten.com/400/300?image=${cat.id}'">
        <div class="absolute inset-0 bg-gradient-to-t from-black/50 to-transparent"></div>
        <button onclick="event.stopPropagation(); toggleFavorite(${cat.id})" class="absolute top-3 right-3 w-10 h-10 rounded-full bg-white/90 flex items-center justify-center shadow-md hover:scale-110 transition-transform">
          <i class="fas fa-heart ${favorites.includes(cat.id) ? 'text-red-500' : 'text-gray-400'}"></i>
        </button>
        <span class="absolute bottom-3 left-3 px-3 py-1 rounded-full text-xs font-medium bg-amber-700 text-white">
          ${cat.category === 'kitten' ? '🐈 Anak' : cat.category === 'adult' ? '😺 Dewasa' : '😸 Senior'}
        </span>
      </div>
      <div class="p-4">
        <div class="flex items-center justify-between mb-2">
          <h3 class="text-xl font-bold ${darkMode ? 'text-amber-50' : 'text-amber-900'}">${cat.name}</h3>
          <span class="text-sm ${darkMode ? 'text-amber-200' : 'text-amber-700'}">${cat.gender === 'Jantan' ? '♂️' : '♀️'} ${cat.age}</span>
        </div>
        <p class="text-sm mb-3 flex items-center gap-1 ${darkMode ? 'text-amber-200' : 'text-amber-700'}">
          <i class="fas fa-map-marker-alt"></i> ${cat.location}
        </p>
        <div class="flex flex-wrap gap-1">
          ${cat.traits.slice(0,2).map(t => `<span class="px-2 py-1 rounded-full text-xs ${darkMode ? 'bg-amber-800 text-amber-100' : 'bg-amber-200 text-amber-800'}">${t}</span>`).join('')}
        </div>
      </div>
    </div>
  `).join('');
}

// TOGGLE FAVORITE
function toggleFavorite(id) {
  if (favorites.includes(id)) {
    favorites = favorites.filter(f => f !== id);
    showToast('Dihapus dari favorit 💔');
  } else {
    favorites.push(id);
    showToast('Ditambahkan ke favorit ❤️');
  }
  localStorage.setItem('catFavorites', JSON.stringify(favorites));
  updateFavCount();
  renderCats();
}

// UPDATE FAV COUNT
function updateFavCount() {
  document.getElementById('favCount').textContent = favorites.length;
  document.getElementById('statFav').textContent = favorites.length;
}

// SET FILTER
function setFilter(filter) {
  currentFilter = filter;
  document.querySelectorAll('.filter-btn').forEach(btn => {
    if (btn.dataset.filter === filter) {
      btn.classList.add('bg-amber-700', 'text-white', 'shadow-lg');
      btn.classList.remove('bg-amber-100', 'text-amber-900');
    } else {
      btn.classList.remove('bg-amber-700', 'text-white', 'shadow-lg');
      btn.classList.add('bg-amber-100', 'text-amber-900');
    }
  });
  renderCats();
}

// FILTER CATS
function filterCats() {
  renderCats();
}

// TOGGLE STATS
function toggleStats() {
  const stats = document.getElementById('statsRow');
  stats.classList.toggle('hidden');
  stats.classList.toggle('grid');
}

// TOGGLE DARK MODE
function toggleDarkMode() {
  darkMode = !darkMode;
  document.body.classList.toggle('bg-amber-950');
  document.getElementById('mainCard').classList.toggle('bg-amber-900/90');
  document.getElementById('mainCard').classList.toggle('bg-amber-200/90');
  document.getElementById('darkModeBtn').innerHTML = darkMode 
    ? '<i class="fas fa-sun"></i> Mode Terang' 
    : '<i class="fas fa-moon"></i> Mode Gelap';
  renderCats();
}

// OPEN MODAL
function openModal(id) {
  const cat = catsData.find(c => c.id === id);
  const modal = document.getElementById('modal');
  const content = document.getElementById('modalContent');
  
  content.innerHTML = `
    <button onclick="closeModal(event)" class="absolute top-4 right-4 z-10 w-10 h-10 rounded-full bg-black/50 text-white flex items-center justify-center hover:bg-black/70">
      <i class="fas fa-times"></i>
    </button>
    <img src="https://cataas.com/cat?width=600&height=400&${cat.seed}" alt="${cat.name}" class="w-full h-64 object-cover" onerror="this.src='https://placekitten.com/600/400?image=${cat.id}'">
    <div class="p-6">
      <div class="flex items-center justify-between mb-4">
        <h2 class="text-3xl font-bold text-amber-900">${cat.name}</h2>
        <button onclick="toggleFavorite(${cat.id})" class="p-3 rounded-full ${favorites.includes(cat.id) ? 'bg-red-100 text-red-500' : 'bg-amber-200 text-amber-700'}">
          <i class="fas fa-heart ${favorites.includes(cat.id) ? '' : 'far'}"></i>
        </button>
      </div>
      <div class="space-y-3 text-amber-800">
        <p><i class="fas fa-calendar text-amber-700 w-5"></i> <strong>Umur:</strong> ${cat.age}</p>
        <p><i class="fas fa-cat text-amber-700 w-5"></i> <strong>Warna:</strong> ${cat.color}</p>
        <p><i class="fas fa-map-marker-alt text-amber-700 w-5"></i> <strong>Lokasi:</strong> ${cat.location}</p>
        <p><span class="text-amber-700">${cat.gender === 'Jantan' ? '♂️' : '♀️'}</span> <strong>Gender:</strong> ${cat.gender}</p>
      </div>
      <div class="mt-4">
        <p class="font-medium mb-2 text-amber-900">Sifat:</p>
        <div class="flex flex-wrap gap-2">
          ${cat.traits.map(t => `<span class="px-3 py-1 rounded-full text-sm bg-amber-700 text-white">${t}</span>`).join('')}
        </div>
      </div>
      <button class="w-full mt-6 py-3 rounded-full bg-amber-700 hover:bg-amber-800 text-white font-bold text-lg transition-colors shadow-lg">
        🏠 Adopsi ${cat.name}
      </button>
    </div>
  `;
  
  modal.classList.remove('hidden');
  modal.classList.add('flex');
}

// CLOSE MODAL
function closeModal(event) {
  if (event.target.id === 'modal' || event.target.closest('button')) {
    document.getElementById('modal').classList.add('hidden');
    document.getElementById('modal').classList.remove('flex');
  }
}

// SHOW TOAST
function showToast(message) {
  const toast = document.getElementById('toast');
  toast.textContent = message;
  toast.classList.remove('hidden');
  setTimeout(() => toast.classList.add('hidden'), 3000);
}
</script>
</body>
</html>
