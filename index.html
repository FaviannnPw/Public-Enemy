<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#8d6e63" />
  <link rel="manifest" href="manifest.json" />
  <title>Adopt Me - Kucing Lokal</title>
  <style>
    :root { --bg: #f5f5dc; --card: #fffaf0; --text: #5d4037; --primary: #8d6e63; --accent: #795548; }
    @media (prefers-color-scheme: dark) {
      :root { --bg: #2d2a26; --card: #3d3833; --text: #e0d4cc; --primary: #a1887f; }
    }
    body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; transition: 0.3s; }
    .header { background: var(--primary); color: white; padding: 30px 20px; text-align: center; }
    .logo-circle { width: 80px; height: 80px; background: white; border-radius: 50%; margin: 0 auto 15px; border: 3px solid var(--accent); overflow: hidden; }
    .logo-circle img { width: 100%; height: 100%; object-fit: cover; }
    .stats { display: flex; justify-content: space-around; background: var(--card); padding: 15px; margin: 20px; border-radius: 15px; font-weight: bold; }
    .main { padding: 0 20px; max-width: 600px; margin: auto; }
    .card { background: var(--card); border-radius: 15px; padding: 15px; border: 1px solid var(--accent); margin-bottom: 15px; cursor: pointer; transition: 0.2s; text-align: center; }
    .meme-card:hover { transform: rotate(-3deg) scale(1.05); }
    button { background: var(--primary); color: white; border: none; padding: 12px; border-radius: 20px; width: 100%; font-weight: bold; cursor: pointer; margin-top: 10px; }
    .btn-meme { background: #ff9800; margin-bottom: 20px; }
    #adopt-modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: var(--card); padding: 25px; border-radius: 20px; box-shadow: 0 0 30px rgba(0,0,0,0.4); width: 85%; max-width: 350px; z-index: 100; }
    input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid var(--accent); border-radius: 10px; box-sizing: border-box; background: var(--bg); color: var(--text); }
  </style>
</head>
<body>
  <header class="header">
    <div class="logo-circle"><img src="URL_LOGO_KAMU_DI_SINI" alt="Logo" onerror="this.src='https://via.placeholder.com/80?text=CAT'"></div>
    <h1>Adopt Kucing 🐾</h1>
    <p>Timika & Sekitarnya</p>
  </header>

  <div class="stats"><span>🐱 12 Ready</span><span>🏠 45 Adopted</span></div>

  <main class="main">
    <button class="btn-meme" onclick="toggleMeme()">🎭 Mode Meme Kucing Lokal</button>
    <div id="grid"></div>
  </main>

  <div id="adopt-modal">
    <h3 id="cat-target">Adopsi</h3>
    <input type="text" id="nama" placeholder="Nama Anda">
    <input type="number" id="wa" placeholder="Nomor WhatsApp">
    <button onclick="gasWA()">Kirim ke WhatsApp</button>
    <button style="background:none; color:gray;" onclick="tutup()">Batal</button>
  </div>

  <script>
    let isMeme = false;
    let target = "";
    const cats = [{n: "Oyen", l: "Timika", d: "Bar-bar tapi penyayang"}, {n: "Mochi", l: "Kuala Kencana", d: "Suka dipukpuk"}];
    const memes = [{n: "Kucing Jaksel", l: "Jakarta", d: "Literally laper banget.."}, {n: "Kucing Papua", l: "Timika", d: "Tra lari, tra asik!"}];

    function render() {
      const g = document.getElementById('grid'); g.innerHTML = "";
      (isMeme ? memes : cats).forEach(i => {
        g.innerHTML += `<div class="card ${isMeme?'meme-card':''}" onclick="buka('${i.n}')"><h3>${i.n}</h3><p>📍 ${i.l}</p><p><i>"${i.d}"</i></p></div>`;
      });
    }
    function toggleMeme() { isMeme = !isMeme; render(); }
    function buka(n) { target = n; document.getElementById('cat-target').innerText = "Adopsi " + n; document.getElementById('adopt-modal').style.display='block'; }
    function tutup() { document.getElementById('adopt-modal').style.display='none'; }
    function gasWA() {
      const n = document.getElementById('nama').value;
      if(!n) return alert("Isi nama dulu bos!");
      window.open(`https://wa.me/6281234567890?text=Halo, saya ${n} ingin adopsi ${target}.`, '_blank');
      tutup();
    }
    if ('serviceWorker' in navigator) { navigator.serviceWorker.register('sw.js').then(() => console.log("PWA Aktif!")); }
    render();
  </script>
</body>
</html>
